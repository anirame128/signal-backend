services:
  postgres:
    image: postgres:16
    container_name: signal_postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - signal_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signal_user -d signal"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  signal_pgdata:
