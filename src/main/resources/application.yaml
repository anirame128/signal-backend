spring:
  application:
    name: backend
  security:
    user:
      name: ${APP_ADMIN_USERNAME:admin}
      password: ${APP_ADMIN_PASSWORD:admin123-change-me}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:signal}
    username: ${DB_USER:signal_user}
    password: ${DB_PASSWORD:signal_local_password}
  
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
    
